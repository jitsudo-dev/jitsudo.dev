<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 596" style="background:#18191b">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- IdP / SSO (top) -->
  <rect x="60" y="24" width="560" height="54" rx="6" fill="#1c1e22" stroke="#2a2d31" stroke-width="1"/>
  <text x="340" y="46" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#cbd5e1">IdP / SSO</text>
  <text x="340" y="65" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">Okta · Microsoft Entra ID · Google Workspace</text>

  <!-- Double-headed arrows: IdP/SSO ↕ Requestors -->
  <line x1="144" y1="78" x2="144" y2="128" stroke="#2a2d31" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <line x1="340" y1="78" x2="340" y2="128" stroke="#2a2d31" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <line x1="536" y1="78" x2="536" y2="128" stroke="#2a2d31" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="340" y="103" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#475569">authenticates with</text>

  <!-- Requestors -->
  <rect x="60" y="128" width="168" height="48" rx="6" fill="#1c1e22" stroke="#f97316" stroke-width="1.5"/>
  <text x="144" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#f97316">jitsudo CLI</text>

  <rect x="256" y="128" width="168" height="48" rx="6" fill="#0f1e33" stroke="#1e3a5f" stroke-width="1"/>
  <text x="340" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="500" fill="#7dd3fc">AI agent</text>

  <rect x="452" y="128" width="168" height="48" rx="6" fill="#0f1e33" stroke="#1e3a5f" stroke-width="1"/>
  <text x="536" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="500" fill="#7dd3fc">Slack bot</text>

  <!-- Converge: requestors → jitsudod -->
  <line x1="144" y1="176" x2="144" y2="206" stroke="#2a2d31" stroke-width="1"/>
  <line x1="340" y1="176" x2="340" y2="206" stroke="#2a2d31" stroke-width="1"/>
  <line x1="536" y1="176" x2="536" y2="206" stroke="#2a2d31" stroke-width="1"/>
  <line x1="144" y1="206" x2="536" y2="206" stroke="#2a2d31" stroke-width="1"/>
  <line x1="340" y1="206" x2="340" y2="248" stroke="#2a2d31" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="340" y="227" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#475569">authenticated request</text>

  <!-- jitsudod outer box -->
  <rect x="60" y="248" width="560" height="236" rx="6" fill="#1c1e22" stroke="#f97316" stroke-width="1.5"/>
  <text x="340" y="268" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#f97316">jitsudod</text>
  <line x1="80" y1="278" x2="600" y2="278" stroke="#2a2d31" stroke-width="1"/>

  <!-- OPA subcomponent chip -->
  <rect x="80" y="290" width="190" height="48" rx="4" fill="#0d1520" stroke="#1e3a5f" stroke-width="1"/>
  <text x="175" y="308" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#7dd3fc">OPA</text>
  <text x="175" y="326" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#475569">approval routing (if eligible)</text>

  <!-- PostgreSQL subcomponent chip -->
  <rect x="410" y="290" width="190" height="48" rx="4" fill="#0d1520" stroke="#1e3a5f" stroke-width="1"/>
  <text x="505" y="308" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#7dd3fc">PostgreSQL</text>
  <text x="505" y="326" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#475569">policies · states · audit log</text>

  <!-- Line: OPA chip → fan-out bar -->
  <line x1="160" y1="338" x2="160" y2="356" stroke="#2a2d31" stroke-width="1"/>

  <!-- Fan-out bar → tier boxes -->
  <line x1="160" y1="356" x2="520" y2="356" stroke="#2a2d31" stroke-width="1"/>
  <line x1="160" y1="356" x2="160" y2="374" stroke="#2a2d31" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="340" y1="356" x2="340" y2="374" stroke="#2a2d31" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="520" y1="356" x2="520" y2="374" stroke="#2a2d31" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Tier 1: green -->
  <rect x="80" y="374" width="160" height="68" rx="6" fill="#0f1f0f" stroke="#1a3a1a" stroke-width="1"/>
  <text x="160" y="400" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#86efac" letter-spacing="0.04em">Tier 1</text>
  <text x="160" y="419" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#64748b">auto-approval</text>

  <!-- Tier 2: yellow -->
  <rect x="260" y="374" width="160" height="68" rx="6" fill="#1c1a05" stroke="#3d3608" stroke-width="1"/>
  <text x="340" y="400" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#facc15" letter-spacing="0.04em">Tier 2</text>
  <text x="340" y="419" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#64748b">AI approval (MCP)</text>

  <!-- Tier 3: red -->
  <rect x="440" y="374" width="160" height="68" rx="6" fill="#1f0f0f" stroke="#3a1a1a" stroke-width="1"/>
  <text x="520" y="400" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#f87171" letter-spacing="0.04em">Tier 3</text>
  <text x="520" y="419" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#64748b">human approval</text>

  <!-- Fan-in: tier boxes → convergence bar -->
  <line x1="160" y1="442" x2="160" y2="466" stroke="#2a2d31" stroke-width="1"/>
  <line x1="340" y1="442" x2="340" y2="466" stroke="#2a2d31" stroke-width="1"/>
  <line x1="520" y1="442" x2="520" y2="466" stroke="#2a2d31" stroke-width="1"/>
  <line x1="160" y1="466" x2="520" y2="466" stroke="#2a2d31" stroke-width="1"/>

  <!-- Arrow: exits jitsudod → Cloud Providers -->
  <line x1="340" y1="466" x2="340" y2="522" stroke="#2a2d31" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="340" y="503" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#475569">grants access to</text>

  <!-- Cloud Providers box -->
  <rect x="60" y="522" width="560" height="62" rx="6" fill="#1c1e22" stroke="#2a2d31" stroke-width="1"/>
  <text x="340" y="546" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#cbd5e1">AWS · GCP · Azure · Kubernetes</text>
  <text x="340" y="567" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">time-limited · auto-expires · fully audited</text>
</svg>
